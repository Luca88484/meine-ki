<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexusAI</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d1117;color:#e6edf3;font-family:system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column}
    #topbar{height:52px;border-bottom:1px solid rgba(48,54,61,0.8);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;background:#0d1117}
    #topbar-left{display:flex;align-items:center;gap:10px}
    .avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#00b4d8,#7b2ff7);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
    .uavatar{background:#1c2128;border:1px solid rgba(48,54,61,0.8);color:#7d8590}
    #topbar span{font-weight:600;font-size:14px}
    #msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:0 20px}
    #msgs-inner{width:100%;max-width:720px;padding:28px 0 8px}
    .msg{display:flex;gap:12px;margin-bottom:22px;animation:msgIn 0.18s ease}
    .msg.user{flex-direction:row-reverse}
    @keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    .msg-name{font-size:12px;font-weight:600;margin-bottom:5px;font-family:system-ui}
    .msg.user .msg-name{color:#7d8590;text-align:right}
    .msg.bot .msg-name{color:#00b4d8}
    .msg-body{font-size:14px;line-height:1.65;font-family:Georgia,serif;word-break:break-word;white-space:pre-wrap}
    .msg.user .msg-body{background:#1c2128;border:1px solid rgba(48,54,61,0.8);border-radius:12px;padding:10px 14px}
    .msg-meta{margin-top:4px;font-size:11px;color:#484f58;font-family:system-ui}
    .img-preview{max-width:240px;max-height:180px;border-radius:10px;border:1px solid rgba(48,54,61,0.8);display:block;margin-bottom:6px;object-fit:cover}
    .img-name{font-size:11px;color:#484f58;margin-bottom:6px}
    a{color:#818cf8;text-decoration:underline}
    strong{color:#f1f5f9;font-weight:700}
    em{font-style:italic}
    code{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:1px 5px;font-size:0.88em;font-family:monospace;color:#a5b4fc}
    ul.md{list-style:none;padding-left:0;margin:6px 0}
    ul.md li{display:flex;gap:8px;margin-bottom:3px}
    ul.md li::before{content:"▸";color:rgba(148,163,184,0.6);font-size:10px;margin-top:4px;flex-shrink:0}
    .dots{display:flex;gap:4px;align-items:center;padding:3px 0}
    .dot{width:5px;height:5px;border-radius:50%;background:#484f58;animation:td 1.2s ease-in-out infinite}
    @keyframes td{0%,60%,100%{transform:scale(1);opacity:0.4}30%{transform:scale(1.3);opacity:1}}
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    .dot-label{font-size:12px;color:#7d8590;margin-left:6px}
    #inputbar{border-top:1px solid rgba(48,54,61,0.8);background:#0d1117;display:flex;justify-content:center;padding:12px 20px 16px;flex-shrink:0}
    #inputwrap{width:100%;max-width:720px}
    #pending-img{margin-bottom:8px;display:none;align-items:center;gap:10px;padding:8px 12px;background:#1c2128;border:1px solid rgba(48,54,61,0.8);border-radius:10px}
    #pending-img img{width:48px;height:48px;border-radius:6px;object-fit:cover;border:1px solid rgba(48,54,61,0.8)}
    #pending-img-info{flex:1}
    #pending-img-name{font-size:12px;font-weight:500}
    #pending-img-desc{font-size:11px;color:#7d8590}
    #inputbox{background:#161b22;border:1px solid rgba(48,54,61,0.8);border-radius:14px;display:flex;align-items:flex-end;padding:10px 12px 10px 16px;gap:8px;transition:border-color 0.15s,box-shadow 0.15s}
    #inputbox:focus-within{border-color:#00b4d8;box-shadow:0 0 0 3px rgba(0,180,216,0.15)}
    #imgbtn{width:32px;height:32px;border-radius:7px;background:transparent;border:1px solid rgba(48,54,61,0.8);color:#7d8590;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.12s}
    #imgbtn:hover{border-color:#00b4d8;color:#00b4d8}
    #txt{flex:1;background:transparent;border:none;outline:none;color:#e6edf3;font-size:14px;line-height:1.6;resize:none;font-family:Georgia,serif;padding:0;max-height:160px;overflow:auto}
    #txt::placeholder{color:#484f58}
    #sendbtn{width:34px;height:34px;border-radius:8px;flex-shrink:0;border:1px solid rgba(48,54,61,0.8);background:transparent;color:#484f58;font-size:18px;cursor:not-allowed;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
    #sendbtn.active{background:#00b4d8;border:none;color:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(0,180,216,0.35)}
    #hint{margin-top:6px;text-align:center;font-size:11px;color:#484f58}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
    pre{background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:12px 14px;font-size:12.5px;line-height:1.6;font-family:monospace;overflow-x:auto;margin:10px 0}
  </style>
</head>
<body>

<div id="topbar">
  <div id="topbar-left">
    <div class="avatar">C</div>
    <span>NexusAI</span>
  </div>
</div>

<div id="msgs"><div id="msgs-inner"></div></div>

<div id="inputbar">
  <div id="inputwrap">
    <div id="pending-img">
      <img id="pending-thumb" src="" alt=""/>
      <div id="pending-img-info">
        <div id="pending-img-name"></div>
        <div id="pending-img-desc">Bild wird analysiert & im Web gesucht</div>
      </div>
      <button onclick="clearImg()" style="background:none;border:1px solid rgba(48,54,61,0.8);border-radius:6px;color:#7d8590;font-size:13px;padding:2px 8px;cursor:pointer">×</button>
    </div>
    <div id="inputbox">
      <input type="file" id="fileinput" accept="image/*" style="display:none" onchange="handleFile(event)"/>
      <button id="imgbtn" onclick="document.getElementById('fileinput').click()" title="Bild hochladen">📎</button>
      <textarea id="txt" rows="1" placeholder="Schreib eine Nachricht oder lade ein Bild hoch…" oninput="autoResize(this);updateBtn()" onkeydown="handleKey(event)"></textarea>
      <button id="sendbtn" onclick="send()">↑</button>
    </div>
    <div id="hint">📎 Bild für Websuche · Enter senden · Shift+Enter neue Zeile</div>
  </div>
</div>

<script>
let history = [];
let pendingImg = null;
let busy = false;

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,160)+'px'}
function updateBtn(){const t=document.getElementById('txt').value.trim();const btn=document.getElementById('sendbtn');btn.className=(t||pendingImg)&&!busy?'active':'';}
function scrollBottom(){const m=document.getElementById('msgs');m.scrollTop=m.scrollHeight}

function addMsg(role,content,{imagePreview,imageName,meta,learned}={}){
  const inner=document.getElementById('msgs-inner');
  const div=document.createElement('div');
  div.className=`msg ${role==='user'?'user':'bot'}`;
  const av=document.createElement('div');
  av.className=role==='user'?'avatar uavatar':'avatar';
  av.textContent=role==='user'?'U':'N';
  const body=document.createElement('div');body.style.flex='1';body.style.minWidth='0';body.style.maxWidth='88%';
  const name=document.createElement('div');name.className='msg-name';name.textContent=role==='user'?'Du':'Claude';
  body.appendChild(name);
  if(imagePreview){const img=document.createElement('img');img.src=imagePreview;img.className='img-preview';const nm=document.createElement('div');nm.className='img-name';nm.textContent='📎 '+imageName;body.appendChild(img);body.appendChild(nm);}
  const text=document.createElement('div');text.className='msg-body';
  if(role==='bot') text.innerHTML=mdToHtml(content);
  else text.textContent=content;
  body.appendChild(text);
  if(meta){const m=document.createElement('div');m.className='msg-meta';m.textContent=meta;body.appendChild(m);}
  div.appendChild(av);div.appendChild(body);
  inner.appendChild(div);scrollBottom();
  return text;
}

function addTyping(label=''){
  const inner=document.getElementById('msgs-inner');
  const div=document.createElement('div');div.className='msg bot';div.id='typing-msg';
  const av=document.createElement('div');av.className='avatar';av.textContent='C';
  const body=document.createElement('div');body.style.flex='1';body.style.maxWidth='88%';
  const name=document.createElement('div');name.className='msg-name';name.textContent='Claude';
  const dots=document.createElement('div');dots.className='dots';
  dots.innerHTML=`<span class="dot"></span><span class="dot"></span><span class="dot"></span>${label?`<span class="dot-label">${label}</span>`:''}`;
  body.appendChild(name);body.appendChild(dots);div.appendChild(av);div.appendChild(body);
  inner.appendChild(div);scrollBottom();
}
function setTypingLabel(label){const d=document.querySelector('#typing-msg .dot-label');if(d)d.textContent=label;}
function removeTyping(){const t=document.getElementById('typing-msg');if(t)t.remove();}

function mdToHtml(text){
  let h=text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```[\s\S]*?```/g,m=>`<pre>${m.slice(3,m.lastIndexOf('```')).replace(/^[a-z]*\n/,'')}</pre>`)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,'<a href="$2" target="_blank" rel="noreferrer">$1</a>')
    .replace(/(https?:\/\/[^\s<>"']+)/g,'<a href="$1" target="_blank" rel="noreferrer">$1</a>')
    .replace(/^[-*] (.+)/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]+?<\/li>)/g,'<ul class="md">$1</ul>')
    .replace(/\n/g,'<br>');
  return h;
}

function handleFile(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    pendingImg={base64:reader.result.split(',')[1],mimeType:file.type,name:file.name,preview:URL.createObjectURL(file)};
    document.getElementById('pending-img').style.display='flex';
    document.getElementById('pending-thumb').src=pendingImg.preview;
    document.getElementById('pending-img-name').textContent=file.name;
    updateBtn();
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

function clearImg(){
  pendingImg=null;
  document.getElementById('pending-img').style.display='none';
  updateBtn();
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}

async function send(){
  const txt=document.getElementById('txt');
  const text=txt.value.trim();
  if((!text&&!pendingImg)||busy)return;
  txt.value='';autoResize(txt);busy=true;updateBtn();
  const t0=Date.now();
  const img=pendingImg;clearImg();

  if(img){
    addMsg('user',text||'Analysiere dieses Bild.',{imagePreview:img.preview,imageName:img.name});
    addTyping('Bild wird analysiert…');
    try{
      const content=[{type:'image',source:{type:'base64',media_type:img.mimeType,data:img.base64}},{type:'text',text:text||'Analysiere dieses Bild und suche im Web nach allem Sichtbaren. Gib alle Links direkt an.'}];
      const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'image',content})});
      const data=await res.json();
      removeTyping();
      addMsg('bot',data.reply,{meta:`${Date.now()-t0}ms · Bildanalyse + Websuche`});
    }catch{removeTyping();addMsg('bot','Fehler bei der Bildanalyse.');}
    busy=false;updateBtn();return;
  }

  addMsg('user',text);
  history.push({role:'user',content:text});
  addTyping();
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'text',messages:history})});
    const data=await res.json();
    history.push({role:'assistant',content:data.reply});
    removeTyping();
    addMsg('bot',data.reply,{meta:`${Date.now()-t0}ms`});
  }catch{removeTyping();addMsg('bot','Fehler. Bitte erneut versuchen.');}
  busy=false;updateBtn();
}

// Initial message
addMsg('bot','Hallo! Ich bin NexusAI 🚀\n\nDeine persönliche KI — ich suche automatisch im Web, lerne aus Links und analysiere Bilder 📎.');
</script>
</body>
</html>
